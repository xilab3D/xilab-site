baseURL = "https://xilab.tech/"
languageCode = "fr-FR"
defaultContentLanguage = "fr"
title = "XiLAB3D+"
theme = "PaperMod"

[params.label]
  text = "XiLAB3D+ : l'ingénierie agile"
  icon = "/favicon.svg"
  iconHeight = 22
enableRobotsTXT = true
enableInlineShortcodes = true

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "light"
  disableThemeToggle = true
  ShowShareButtons = false
  ShowReadingTime = false
  ShowBreadCrumbs = false
  ShowToc = false
  TocOpen = false
  ShowPostNavLinks = true

  [params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon.svg"
    favicon32x32 = "favicon.svg"
  comments = false
  math = false
  description = "Bureau d'études et de R&D en ingénierie numérique — Conception, Simulation, IA"
  author = "XiLAB3D+"

  [params.profileMode]
    enabled = true
    title = "Bureau d'études et de R&D en ingénierie numérique"
    subtitle = "Jumeaux Numériques, Simulation Numérique et Fabrication Additive"
    imageUrl = "images/logo-xilab.png"
    imageWidth = 160
    imageHeight = 78
    imageTitle = "XiLAB3D+ : l'ingénierie agile"

    [[params.profileMode.buttons]]
      name = "À propos"
      url = "/about"

    [[params.profileMode.buttons]]
      name = "Services"
      url = "/services"

    [[params.profileMode.buttons]]
      name = "Partenaires"
      url = "/partenaires"

  [[params.socialIcons]]
    name = "location"
    url = "/contact#localisation"
    title = "Nous trouver"

  [[params.socialIcons]]
    name = "email"
    url = "/contact"
    title = "Nous écrire"

  [[params.socialIcons]]
    name = "calendar"
    url = "https://calendar.app.google/MATDAF7zhduQhWx26"
    title = "Prendre rendez-vous"

  [[params.socialIcons]]
    name = "presse"
    url = "/presse"
    title = "Espace presse"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/company/108783640/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xilab3D"

[menu]
  [[menu.main]]
    identifier = "services"
    name = "Services"
    url = "/services/"
    weight = 10

  [[menu.main]]
    identifier = "rd"
    name = "R&D"
    url = "/rd/"
    weight = 40

  [[menu.main]]
    identifier = "outils"
    name = "Outils"
    url = "/outils/"
    weight = 45

  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 50

  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 60

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block  = [["$$", "$$"]]
        inline = [["$", "$"], ["\\(", "\\)"]]
